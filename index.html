  { id:"A8", page:"creates", title:"The thing nobody's talking about — WebMCP", format:"Reel (60-75 sec)", shotSetup:"Standing, I/O background", timing:"Week 1",
    note:"If you attended the Chrome stage workshops on WebMCP, add specific observations. The travel demo and pizza ordering demo are good concrete examples if you saw them.",
    content:`Hook:
"Everyone's talking about Gemini and the AI glasses. But there's an update from Google I/O that could change how the entire internet works — and almost nobody covered it."

Body:
"It's called WebMCP. Let me explain it simply.

Right now, when an AI agent tries to do something on a website — say, book a flight or fill a form — it works like a tourist who doesn't speak the language. It takes a screenshot of the page, tries to figure out which button to press, clicks it, takes another screenshot, and hopes nothing broke. It's slow, unreliable, and kind of hilarious.

WebMCP fixes this. It's a new standard where websites can tell AI agents — here's a menu of everything you can do on this page, and here's exactly how to do it.

Think of it like this — instead of an AI agent stumbling through a restaurant guessing what food they serve, the restaurant now hands them a structured menu and says, just pick what you want.

Google and Microsoft built this together. It's already in Chrome as an early preview, and companies like Expedia and Shopify are already experimenting.

Why does this matter? Because in 2-3 years, a huge chunk of web interactions will be done by AI agents on your behalf. And WebMCP is the infrastructure that makes that possible. The Chrome stage at I/O Connect actually had dedicated workshops on this."

  { id:"HC6", page:"creates", title:"Visibility changed everything for me", format:"Reel (60-75 sec)", shotSetup:"Talking head OR with Arsh if he's there", timing:"Week 2",

    content:`Hook:
"Three years ago, I was in the audience at Google I/O. Today, I walked in with a media pass. Here's what changed."

Body:
"In 2023, I attended Google I/O as a regular ticket holder. No camera, no plan, no content strategy. I showed up, watched sessions, and went home.

After that, I started creating content. Not viral stuff — just sharing what I know about tech, in my language, for people figuring out their careers. Consistently.

And something happened — I became visible. People discovered my content, reached out, connected. I got into rooms I wouldn't have been in otherwise. I connected with creators like Arsh Goyal, built genuine relationships in the tech community.

  }
  for(let i=0;i<DAY_SCHEDULE.length;i++){
    const b = DAY_SCHEDULE[i];
    if(b.startMin>=0 && mins<b.startMin) return {status:"next", block:b, index:i};
  }
  return {status:"done", block:null, index:-1};
}

// ---------------- PERSISTENCE ----------------
// Uses localStorage so data persists across visits once deployed (e.g. on Vercel).
const STORAGE_KEY = "io2026-tracker-data";

async function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state.edits = parsed.edits || {};
      state.shot = parsed.shot || {};
      state.checklist = parsed.checklist || {};
      state.customScripts = parsed.customScripts || [];
      state.ideas = parsed.ideas || [];
      state.customChecklistItems = parsed.customChecklistItems || {};
    }
  }catch(e){ /* no saved data yet, or storage unavailable */ }
  state.loaded = true;
  render();
}

let saveTimeout = null;
async function persist(){
  const payload = {
    edits: state.edits, shot: state.shot, checklist: state.checklist,
    customScripts: state.customScripts, ideas: state.ideas,
    customChecklistItems: state.customChecklistItems,
  };
  try{
    state.saveStatus = "Saving…";
    renderSaveStatus();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    state.saveStatus = "Saved";
  }catch(e){
    state.saveStatus = "Save failed";
  }
  renderSaveStatus();
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(()=>{ state.saveStatus=""; renderSaveStatus(); }, 1500);
}
  
function renderSaveStatus(){
  const el = document.getElementById('save-status');
  if(el) el.textContent = state.saveStatus;
}

// ---------------- ACTIONS ----------------
function setTab(t){ state.tab = t; state.expandedId = null; render(); }
function setFilter(f){ state.filter = f; render(); }
function toggleCard(id){ state.expandedId = state.expandedId===id ? null : id; render(); }
function toggleShot(id, ev){ ev.stopPropagation(); state.shot[id] = !state.shot[id]; render(); persist(); }
function toggleCheck(key){ state.checklist[key] = !state.checklist[key]; render(); persist(); }
function handleEditChange(id, value){ state.edits[id] = value; }
function handleEditBlur(){ persist(); }
function openFocus(title, text, ev){ if(ev) ev.stopPropagation(); state.focusItem = {title, text}; render(); }
function closeFocus(){ state.focusItem = null; render(); }

function toggleAddScript(){ state.showAddScript = !state.showAddScript; render(); }
function updateNewScript(field, value){ state.newScript[field] = value; }
function addCustomScript(){
  if(!state.newScript.title.trim()) return;
  const id = "CUSTOM-" + Date.now();
  state.customScripts.push({ id, isCustom:true, ...state.newScript });
  state.newScript = { page:"presents", title:"", format:"", shotSetup:"", timing:"", content:"" };
  state.showAddScript = false;
  render(); persist();
}
function deleteCustomScript(id){
  state.customScripts = state.customScripts.filter(s=>s.id!==id);
  if(state.expandedId===id) state.expandedId = null;
  render(); persist();
}

function toggleAddIdea(){ state.showAddIdea = !state.showAddIdea; render(); }
function updateNewIdea(field, value){ state.newIdea[field] = value; }
function addIdea(){
  if(!state.newIdea.title.trim()) return;
  const id = "IDEA-" + Date.now();
  state.ideas.push({ id, ...state.newIdea });
  state.newIdea = { title:"", content:"" };
  state.showAddIdea = false;
  render(); persist();
}
function deleteIdea(id){
  state.ideas = state.ideas.filter(i=>i.id!==id);
  if(state.expandedId===id) state.expandedId = null;
  render(); persist();
}

function updateChecklistInput(key, value){ state.checklistInputs[key] = value; }
function addChecklistItem(sectionKey){
  const text = (state.checklistInputs[sectionKey]||"").trim();
  if(!text) return;
  if(!state.customChecklistItems[sectionKey]) state.customChecklistItems[sectionKey] = [];
  state.customChecklistItems[sectionKey].push(text);
  state.checklistInputs[sectionKey] = "";
  render(); persist();
}
function deleteChecklistItem(sectionKey, idx){
  state.customChecklistItems[sectionKey] = (state.customChecklistItems[sectionKey]||[]).filter((_,i)=>i!==idx);
  render(); persist();
}

function goToScript(id){
  state.tab = "scripts"; state.filter = "all"; state.expandedId = id;
  render();
  setTimeout(()=>{
    const el = document.getElementById('card-'+id);
    if(el) el.scrollIntoView({behavior:"smooth", block:"center"});
  }, 60);
}

// ---------------- RENDER ----------------
function render(){
  if(!state.loaded){
    document.getElementById('app').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#666;">Loading…</div>`;
    return;
  }

  const nowInfo = getCurrentBlockInfo();
  let headerSub = "";
  if(nowInfo.status==="current") headerSub = `Now: ${escapeHtml(nowInfo.block.label)} (${escapeHtml(nowInfo.block.time)})`;
  else if(nowInfo.status==="next") headerSub = `Next up: ${escapeHtml(nowInfo.block.label)} at ${escapeHtml(nowInfo.block.time)}`;
  else headerSub = "Day's schedule complete";

  let html = `
    <div class="header">
      <div>
        <div class="header-title">Google I/O 2026 — Content Tracker</div>
        <div class="header-sub">${headerSub}</div>
      </div>
      <div class="save-status" id="save-status">${state.saveStatus}</div>
    </div>
    <div class="tab-row">
      <button class="tab-btn ${state.tab==='scripts'?'active':''}" onclick="setTab('scripts')">Scripts</button>
      <button class="tab-btn ${state.tab==='schedule'?'active':''}" onclick="setTab('schedule')">Schedule</button>
      <button class="tab-btn ${state.tab==='checklists'?'active':''}" onclick="setTab('checklists')">Checklist</button>
      <button class="tab-btn ${state.tab==='ideas'?'active':''}" onclick="setTab('ideas')">Ideas</button>
    </div>
  `;

  if(state.tab==='scripts') html += renderScriptsTab();
  else if(state.tab==='schedule') html += renderScheduleTab(nowInfo);
  else if(state.tab==='checklists') html += renderChecklistTab();
  else if(state.tab==='ideas') html += renderIdeasTab();

  if(state.focusItem) html += renderFocusOverlay();

  document.getElementById('app').innerHTML = html;
  attachTextareaListeners();
}

function attachTextareaListeners(){
  document.querySelectorAll('textarea[data-edit-id]').forEach(ta=>{
    ta.addEventListener('input', e=> handleEditChange(ta.dataset.editId, e.target.value));
    ta.addEventListener('blur', handleEditBlur);
  });
  document.querySelectorAll('textarea[data-new-script-field]').forEach(ta=>{
    ta.addEventListener('input', e=> updateNewScript(ta.dataset.newScriptField, e.target.value));
  });
  document.querySelectorAll('input[data-new-script-field]').forEach(inp=>{
    inp.addEventListener('input', e=> updateNewScript(inp.dataset.newScriptField, e.target.value));
  });
  document.querySelectorAll('select[data-new-script-field]').forEach(sel=>{
    sel.addEventListener('change', e=> updateNewScript(sel.dataset.newScriptField, e.target.value));
  });
  document.querySelectorAll('input[data-new-idea-field]').forEach(inp=>{
    inp.addEventListener('input', e=> updateNewIdea(inp.dataset.newIdeaField, e.target.value));
  });
  document.querySelectorAll('textarea[data-new-idea-field]').forEach(ta=>{
    ta.addEventListener('input', e=> updateNewIdea(ta.dataset.newIdeaField, e.target.value));
  });
  document.querySelectorAll('input[data-checklist-input]').forEach(inp=>{
    inp.addEventListener('input', e=> updateChecklistInput(inp.dataset.checklistInput, e.target.value));
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter') addChecklistItem(inp.dataset.checklistInput); });
  });
}

function renderScriptsTab(){
  const scripts = allScripts();
  const shotCount = scripts.filter(s=>state.shot[s.id]).length;
  const visible = state.filter==='all' ? scripts : scripts.filter(s=>s.page===state.filter);

  let html = `
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${(shotCount/scripts.length*100)||0}%"></div></div>
      <div class="progress-label">${shotCount} / ${scripts.length} shot</div>
    </div>
    <div class="filter-row">
      ${FILTERS.map(f=>{
        const count = f.key==='all' ? scripts.length : scripts.filter(s=>s.page===f.key).length;
        return `<button class="filter-pill ${state.filter===f.key?'active':''}" onclick="setFilter('${f.key}')">${f.label} (${count})</button>`;
      }).join('')}
    </div>
    <div class="add-row">
      <button class="add-btn" onclick="toggleAddScript()">+ Add script</button>
    </div>
  `;

  if(state.showAddScript){
    html += `
      <div class="add-form">
        <select class="select" data-new-script-field="page">
          <option value="presents" ${state.newScript.page==='presents'?'selected':''}>harshith.presents</option>
          <option value="creates" ${state.newScript.page==='creates'?'selected':''}>harshith.creates</option>
          <option value="peopld" ${state.newScript.page==='peopld'?'selected':''}>peopld.in</option>
          <option value="sas" ${state.newScript.page==='sas'?'selected':''}>storiesatscale</option>
        </select>
        <input class="field-input" placeholder="Title" data-new-script-field="title" value="${escapeHtml(state.newScript.title)}">
        <div class="add-form-row2">
          <input class="field-input" placeholder="Format (e.g. Reel 45-60 sec)" data-new-script-field="format" value="${escapeHtml(state.newScript.format)}">
          <input class="field-input" placeholder="Timing (e.g. Week 1)" data-new-script-field="timing" value="${escapeHtml(state.newScript.timing)}">
        </div>
        <input class="field-input" placeholder="Shot setup" data-new-script-field="shotSetup" value="${escapeHtml(state.newScript.shotSetup)}">
        <textarea class="content-textarea" placeholder="Script content..." rows="6" data-new-script-field="content">${escapeHtml(state.newScript.content)}</textarea>
        <div class="form-actions">
          <button class="save-btn" onclick="addCustomScript()">Save script</button>
          <button class="cancel-btn" onclick="toggleAddScript()">Cancel</button>
        </div>
      </div>
    `;
  }

  html += `<div class="card-list">`;
  visible.forEach(script=>{
    const isOpen = state.expandedId===script.id;
    const isShot = !!state.shot[script.id];
    const currentText = state.edits[script.id] !== undefined ? state.edits[script.id] : script.content;
    html += `
      <div class="card" id="card-${script.id}">
        <div class="card-header" onclick="toggleCard('${script.id}')">
          <input type="checkbox" class="card-checkbox" ${isShot?'checked':''} onclick="toggleShot('${script.id}', event)" onchange="event.stopPropagation()">
          <div class="card-header-text">
            <div class="card-title-row">
              <span class="page-tag" style="background:${PAGE_COLORS[script.page]||'#555'}">${script.id}</span>
              <span class="card-title ${isShot?'done':''}">${escapeHtml(script.title)}</span>
            </div>
            <div class="card-meta">${escapeHtml(script.format)} · ${escapeHtml(script.timing)}</div>
          </div>
          <button class="icon-btn" onclick="openFocus('${escapeHtml(script.title).replace(/'/g,"\\'")}', document.getElementById('ta-${script.id}') ? document.getElementById('ta-${script.id}').value : ${JSON.stringify(currentText)}, event)" title="Full screen">⛶</button>
          <span class="icon-btn">${isOpen?'▲':'▼'}</span>
        </div>
        ${isOpen ? `
          <div class="card-body">
            <div class="shot-setup-line"><b>Shot setup:</b> ${escapeHtml(script.shotSetup)}</div>
            ${script.note ? `<div class="note-box"><b>Note:</b> ${escapeHtml(script.note)}</div>` : ''}
            <textarea class="content-textarea" id="ta-${script.id}" data-edit-id="${script.id}" rows="14">${escapeHtml(currentText)}</textarea>
            ${script.isCustom ? `<button class="delete-btn" onclick="deleteCustomScript('${script.id}')">🗑 Delete this script</button>` : ''}
          </div>
        ` : ''}
      </div>
    `;
  });
  html += `</div>`;
  return html;
}

function renderScheduleTab(nowInfo){
  let html = `<div class="card-list">`;
  DAY_SCHEDULE.forEach((block, i)=>{
    const isCurrent = nowInfo.status==='current' && nowInfo.index===i;
    const isNext = nowInfo.status==='next' && nowInfo.index===i;
    html += `
      <div class="schedule-card ${isCurrent?'current':''} ${isNext?'next':''}">
        <div class="schedule-time">${escapeHtml(block.time)} ${isCurrent?'<span class="now-badge">NOW</span>':''} ${isNext?'<span class="next-badge">NEXT</span>':''}</div>
        <div class="schedule-label">${escapeHtml(block.label)}</div>
        <div class="schedule-detail">${escapeHtml(block.detail)}</div>
        ${block.scriptIds.length>0 ? `
          <div class="chip-row">
            ${block.scriptIds.map(id=>{
              const s = allScripts().find(sc=>sc.id===id);
              if(!s) return '';
              const isShotChip = !!state.shot[id];
              return `<button class="chip" style="background:${PAGE_COLORS[s.page]||'#555'};opacity:${isShotChip?0.45:1}" onclick="goToScript('${id}')">${id}${isShotChip?' ✓':''}</button>`;
            }).join('')}
          </div>
        ` : ''}
      </div>
    `;
  });
  html += `</div>`;
  return html;
}

function renderChecklistTab(){
  let totalItems = 0, doneItems = 0;
  CHECKLIST_SECTIONS.forEach(sec=>{
    const customItems = state.customChecklistItems[sec.key] || [];
    totalItems += sec.items.length + customItems.length;
    doneItems += sec.items.filter((_,i)=>state.checklist[`${sec.key}:${i}`]).length;
    doneItems += customItems.filter((_,i)=>state.checklist[`${sec.key}:custom:${i}`]).length;
  });

  let html = `
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${(doneItems/totalItems*100)||0}%"></div></div>
      <div class="progress-label">${doneItems} / ${totalItems} done</div>
    </div>
    <div class="card-list">
  `;

  CHECKLIST_SECTIONS.forEach(sec=>{
    const customItems = state.customChecklistItems[sec.key] || [];
    const doneInSection = sec.items.filter((_,i)=>state.checklist[`${sec.key}:${i}`]).length +
      customItems.filter((_,i)=>state.checklist[`${sec.key}:custom:${i}`]).length;
    html += `
      <div class="checklist-card">
        <div class="checklist-header">
          <span class="checklist-title">${escapeHtml(sec.title)}</span>
          <span class="checklist-count">${doneInSection}/${sec.items.length + customItems.length}</span>
        </div>
        ${sec.items.map((item,i)=>{
          const key = `${sec.key}:${i}`;
          const checked = !!state.checklist[key];
          return `
            <label class="checklist-row">
              <input type="checkbox" class="card-checkbox" ${checked?'checked':''} onchange="toggleCheck('${key}')">
              <span class="checklist-item-text ${checked?'done':''}">${escapeHtml(item)}</span>
            </label>
          `;
        }).join('')}
        ${customItems.map((item,i)=>{
          const key = `${sec.key}:custom:${i}`;
          const checked = !!state.checklist[key];
          return `
            <div class="checklist-row-custom">
              <label class="checklist-row" style="flex:1;padding:4px 0;">
                <input type="checkbox" class="card-checkbox" ${checked?'checked':''} onchange="toggleCheck('${key}')">
                <span class="checklist-item-text ${checked?'done':''}">${escapeHtml(item)}</span>
              </label>
              <button class="small-delete" onclick="deleteChecklistItem('${sec.key}', ${i})">✕</button>
            </div>
          `;
        }).join('')}
        <div class="add-item-row">
          <input class="add-item-input" placeholder="Add item…" data-checklist-input="${sec.key}" value="${escapeHtml(state.checklistInputs[sec.key]||'')}">
          <button class="add-item-btn" onclick="addChecklistItem('${sec.key}')">+</button>
        </div>
      </div>
    `;
  });

  html += `</div>`;
  return html;
}

function renderIdeasTab(){
  let html = `<div class="card-list">`;

  REFERENCE_CARDS.forEach(ref=>{
    const isOpen = state.expandedId===ref.id;
    const currentText = state.edits[ref.id] !== undefined ? state.edits[ref.id] : ref.content;
    html += `
      <div class="card">
        <div class="card-header" onclick="toggleCard('${ref.id}')">
          <div class="card-header-text">
            <div class="card-title-row">
              <span class="page-tag" style="background:#444">REF</span>
              <span class="card-title">${escapeHtml(ref.title)}</span>
            </div>
          </div>
          <button class="icon-btn" onclick="openFocus('${escapeHtml(ref.title).replace(/'/g,"\\'")}', document.getElementById('ta-${ref.id}') ? document.getElementById('ta-${ref.id}').value : ${JSON.stringify(currentText)}, event)">⛶</button>
          <span class="icon-btn">${isOpen?'▲':'▼'}</span>
        </div>
        ${isOpen ? `
          <div class="card-body">
            <textarea class="content-textarea" id="ta-${ref.id}" data-edit-id="${ref.id}" rows="16">${escapeHtml(currentText)}</textarea>
          </div>
        ` : ''}
      </div>
    `;
  });

  html += `<div class="ideas-section-header">Your Ideas</div>
    <div class="add-row"><button class="add-btn" onclick="toggleAddIdea()">+ Add idea</button></div>`;

  if(state.showAddIdea){
    html += `
      <div class="add-form">
        <input class="field-input" placeholder="Idea title" data-new-idea-field="title" value="${escapeHtml(state.newIdea.title)}">
        <textarea class="content-textarea" placeholder="Details..." rows="5" data-new-idea-field="content">${escapeHtml(state.newIdea.content)}</textarea>
        <div class="form-actions">
          <button class="save-btn" onclick="addIdea()">Save idea</button>
          <button class="cancel-btn" onclick="toggleAddIdea()">Cancel</button>
        </div>
      </div>
    `;
  }

  if(state.ideas.length===0 && !state.showAddIdea){
    html += `<div class="empty-text">No extra ideas added yet — tap "Add idea" for anything new that comes up.</div>`;
  }

  state.ideas.forEach(idea=>{
    const isOpen = state.expandedId===idea.id;
    const currentText = state.edits[idea.id] !== undefined ? state.edits[idea.id] : idea.content;
    html += `
      <div class="card">
        <div class="card-header" onclick="toggleCard('${idea.id}')">
          <div class="card-header-text">
            <div class="card-title-row">
              <span class="page-tag" style="background:#555">IDEA</span>
              <span class="card-title">${escapeHtml(idea.title)}</span>
            </div>
          </div>
          <button class="icon-btn" onclick="openFocus('${escapeHtml(idea.title).replace(/'/g,"\\'")}', document.getElementById('ta-${idea.id}') ? document.getElementById('ta-${idea.id}').value : ${JSON.stringify(currentText)}, event)">⛶</button>
          <span class="icon-btn">${isOpen?'▲':'▼'}</span>
        </div>
        ${isOpen ? `
          <div class="card-body">
            <textarea class="content-textarea" id="ta-${idea.id}" data-edit-id="${idea.id}" rows="6">${escapeHtml(currentText)}</textarea>
            <button class="delete-btn" onclick="deleteIdea('${idea.id}')">🗑 Delete this idea</button>
          </div>
        ` : ''}
      </div>
    `;
  });

  html += `</div>`;
  return html;
}

function renderFocusOverlay(){
  return `
    <div class="focus-overlay">
      <div class="focus-header">
        <div class="focus-title">${escapeHtml(state.focusItem.title)}</div>
        <button class="focus-close" onclick="closeFocus()">✕</button>
      </div>
      <div class="focus-body">${escapeHtml(state.focusItem.text)}</div>
    </div>
  `;
}

// ---------------- INIT ----------------
loadData();
setInterval(()=>{ if(state.tab==='scripts' || state.tab==='schedule') render(); }, 30000);
</script>
